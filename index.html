*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:14px;background:#0e0e0e;color:#e0e0e0}
.app{padding:1rem;max-width:100%;padding-top:calc(1rem + 44px)}
.tabs{display:flex;gap:3px;border-bottom:1px solid #2a2a2a;position:fixed;top:28px;left:0;right:0;z-index:9990;background:#0e0e0e;padding:0 1rem;margin:0}
.tab{font-size:12px;padding:8px 16px;border-radius:6px 6px 0 0;border:1px solid transparent;cursor:pointer;color:#555;background:transparent;margin-bottom:-1px;white-space:nowrap;font-family:inherit}
.tab.on{border-color:#2a2a2a;border-bottom-color:#0e0e0e;color:#e0e0e0;font-weight:500;background:#0e0e0e}
.view{display:none}.view.on{display:block}
.sbtn{font-size:11px;padding:5px 11px;border-radius:6px;border:1px solid #2a2a2a;background:transparent;color:#666;cursor:pointer;white-space:nowrap;font-family:inherit}
.sbtn:hover{background:#1a1a1a}.sbtn.ok{background:#e0e0e0;color:#0e0e0e;border-color:transparent}
.sbtn.danger{color:#e74c3c;border-color:#e74c3c}.sbtn.accent{color:#4caf50;border-color:#4caf50}
.main-layout{display:grid;grid-template-columns:185px 1fr 210px;gap:10px;align-items:start}
.bank{background:#161616;border-radius:10px;border:1px solid #2a2a2a;padding:10px;position:relative;top:0;z-index:100}
.bank-title{font-size:10px;font-weight:600;color:#444;letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px}
.bi{border-radius:5px;padding:5px 7px;font-size:11px;font-weight:600;margin-bottom:4px;cursor:grab;user-select:none;display:flex;align-items:center;gap:4px}
.bi:active{cursor:grabbing;opacity:.7}.bi.done-task{opacity:.35;cursor:default;text-decoration:line-through}
.bi-dot{width:12px;height:12px;border-radius:50%;border:2px solid rgba(255,255,255,.15);cursor:pointer;flex-shrink:0}
.bi-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px}
.bi-dur{font-size:9px;opacity:.55;white-space:nowrap}
.bi-act{font-size:12px;cursor:pointer;opacity:.3;flex-shrink:0;line-height:1;background:none;border:none;padding:0 1px;color:inherit;font-family:inherit}
.bi-act:hover{opacity:.8}
.prog-bar{height:3px;background:#222;border-radius:2px;margin-top:9px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;background:#4caf50;transition:width .3s}
.prog-lbl{font-size:9px;color:#444;margin-top:3px}
.bank-btns{display:flex;flex-direction:column;gap:4px;margin-top:9px}
.sel-panel{background:#161616;border-radius:10px;border:1px solid #2a2a2a;padding:0;margin-bottom:10px;overflow:hidden}
.sel-panel-header{padding:10px 10px 8px;border-bottom:1px solid #1a1a1a}
.sel-panel-empty{color:#333;font-size:11px;text-align:center;padding:16px 10px}
.sel-panel-title{font-size:10px;font-weight:600;color:#444;letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px}
.sel-panel-body{padding:10px}
.sel-notes{width:100%;background:transparent;border:none;border-radius:0;color:inherit;font-size:11px;padding:0;resize:none;min-height:80px;font-family:inherit;outline:none;line-height:1.5}
.sel-actions{display:flex;gap:5px;padding:8px 10px;border-top:1px solid rgba(255,255,255,.08)}
.cal-scroll{overflow-y:auto;max-height:calc(100vh - 120px)}
.month-block{margin-bottom:24px}
.month-label{font-size:11px;font-weight:600;color:#555;letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;padding-left:2px}
.cal-wrap{overflow-x:auto;isolation:isolate}
table.cal{width:100%;border-collapse:collapse;table-layout:fixed}
.cal th{font-size:10px;font-weight:600;color:#444;padding:5px 2px;border-bottom:1px solid #222;text-align:center;background:#0e0e0e;position:sticky;top:0;z-index:10}
.cal th.tc{width:34px;text-align:right;padding-right:5px}
.cal td{border:1px solid #1a1a1a;position:relative;vertical-align:top;background:#0e0e0e}
.cal td.tc{font-size:9px;color:#333;text-align:right;padding-right:4px;padding-top:3px;border:none;border-top:1px solid #1a1a1a;cursor:default;width:34px;background:#0e0e0e;position:sticky;left:0;z-index:5}
.cal td.dov{outline:2px dashed #3498db;outline-offset:-2px;background:#0d1e2e}
.slot{height:56px}.slot-half{height:28px}
.block{position:absolute;inset:1px;border-radius:4px;padding:2px 5px 4px;font-size:10px;font-weight:600;overflow:hidden;cursor:pointer;display:flex;flex-direction:column;align-items:stretch;z-index:2;user-select:none;transition:filter .1s}
.block:hover{filter:brightness(.8)}
.block.selected-block{outline:2px solid #fff;outline-offset:-2px}
.block.done-block{background:#2a2a2a !important;border:1px solid #444}
.block.done-block .bl-n{text-decoration:line-through;color:#888 !important}
.bl-row{display:flex;align-items:flex-start;gap:2px}
.bl-n{flex:1;overflow:hidden;font-size:9px;white-space:nowrap;text-overflow:ellipsis;line-height:1.4}
.bl-x{font-size:12px;opacity:.4;cursor:pointer;flex-shrink:0;line-height:1;background:none;border:none;padding:0;color:inherit;font-family:inherit}
.bl-x:hover{opacity:1}


.now-ln{position:absolute;left:0;right:0;height:2px;background:#e74c3c;z-index:8;pointer-events:none}
.resize-handle{position:absolute;bottom:0;left:0;right:0;height:8px;cursor:ns-resize;background:transparent;border-radius:0 0 4px 4px;z-index:20}.block:hover .resize-handle{background:rgba(255,255,255,.15)}
.evt-block{position:absolute;inset:1px;border-radius:4px;padding:2px 5px;font-size:9px;font-weight:600;overflow:hidden;cursor:pointer;display:flex;align-items:center;z-index:2;background:#1a2a3a;color:#85B7EB;border-left:3px solid #3498db}
.evt-block:hover{filter:brightness(1.2)}
.right-panel{display:flex;flex-direction:column;gap:10px;position:relative;top:0;z-index:100}
.panel-card{background:#161616;border-radius:10px;border:1px solid #2a2a2a;padding:10px}
.panel-title{font-size:10px;font-weight:600;color:#444;letter-spacing:.06em;text-transform:uppercase;margin-bottom:9px}
.sk-row{display:flex;flex-direction:column;gap:8px}
.sk-item{display:flex;flex-direction:column;gap:2px}
.sk-head{display:flex;align-items:center;justify-content:space-between}
.sk-name{font-size:11px;font-weight:500;color:#e0e0e0}.sk-val{font-size:11px;font-weight:600;color:#e0e0e0}
.sk-bar-bg{height:5px;background:#222;border-radius:3px;overflow:hidden}
.sk-bar-fill{height:100%;border-radius:3px;background:#e0e0e0;transition:width .5s}
.sk-delta{font-size:9px;color:#444}.sk-delta.up{color:#4caf50}.sk-delta.dn{color:#e74c3c}
.hy-mini{display:flex;align-items:flex-end;gap:10px;margin-bottom:8px}
.glass{width:38px;height:56px;border:2px solid #378ADD;border-radius:4px 4px 8px 8px;position:relative;overflow:hidden;flex-shrink:0;cursor:pointer}
.glass:hover{border-color:#5a9ee8}
.glass-fill{position:absolute;bottom:0;left:0;right:0;background:#0C447C;transition:height .4s}
.glass-lines{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:space-evenly;pointer-events:none}
.glass-line{border-top:1px solid rgba(56,138,221,.2)}
.glass-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:#85B7EB;z-index:2}
.hy-info{flex:1}.hy-amount{font-size:17px;font-weight:600;color:#e0e0e0;line-height:1}
.hy-sub{font-size:9px;color:#444;margin-top:1px}
.hy-bar-bg{height:5px;background:#222;border-radius:3px;overflow:hidden;margin-top:7px}
.hy-bar-fill{height:100%;border-radius:3px;background:#3498db;transition:width .4s}.hy-bar-fill.done{background:#4caf50}
.drops{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:8px}
.hy-btns{display:flex;gap:4px;flex-wrap:wrap}
.hy-msg{font-size:9px;color:#444;margin-top:5px;min-height:13px}.hy-msg.done{color:#4caf50;font-weight:600}
.empire-top{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:16px}
.metric{background:#161616;border-radius:8px;padding:12px 14px}
.metric-lbl{font-size:11px;color:#444;margin-bottom:4px}.metric-val{font-size:24px;font-weight:600;color:#e0e0e0}.metric-sub{font-size:10px;color:#333;margin-top:2px}
.rev-chart-wrap{background:#161616;border:1px solid #2a2a2a;border-radius:10px;padding:14px;margin-bottom:14px}
.empire-edit{display:flex;gap:8px;flex-wrap:wrap;align-items:center;background:#161616;border-radius:8px;padding:10px 12px}
.empire-edit input{font-size:12px;padding:5px 9px;border:1px solid #2a2a2a;border-radius:6px;background:#0e0e0e;color:#e0e0e0;width:110px;font-family:inherit}
.empire-edit label{font-size:11px;color:#444}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:999;display:flex;align-items:center;justify-content:center}
.modal{background:#161616;border:1px solid #2a2a2a;border-radius:14px;padding:1.25rem;width:340px;max-width:92vw;max-height:90vh;overflow-y:auto;color:#e0e0e0}
.modal h3{font-size:14px;font-weight:600;margin-bottom:12px;color:#e0e0e0}
.modal input,.modal select,.modal textarea{width:100%;padding:7px 9px;font-size:12px;border:1px solid #2a2a2a;border-radius:7px;background:#0e0e0e;color:#e0e0e0;margin-bottom:8px;font-family:inherit}
.modal textarea{min-height:60px;resize:vertical}
.modal label{font-size:10px;color:#555;display:block;margin-bottom:2px}
.macts{display:flex;gap:6px;margin-top:6px}
.mb{font-size:12px;padding:6px 12px;border-radius:7px;cursor:pointer;border:1px solid #2a2a2a;background:transparent;color:#888;font-family:inherit}
.mb:hover{background:#222}.mb.ok{background:#e0e0e0;color:#0e0e0e;border-color:transparent}
.mb.del{color:#e74c3c;border-color:#e74c3c}.mb.done-btn{color:#4caf50;border-color:#4caf50}
.swrow{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.sw{width:20px;height:20px;border-radius:4px;cursor:pointer;border:2px solid transparent}.sw.sel,.sw:hover{border-color:#e0e0e0}
.sk-edit-item{border:1px solid #2a2a2a;border-radius:8px;padding:9px;margin-bottom:8px;background:#111}
.add-skill-row{margin-top:8px;display:flex;gap:5px;align-items:center;flex-wrap:wrap}

// ── PURE MOUSE DRAG SYSTEM ──
var _drag=null; // {type:'bank'|'block', taskId, pid, slots, weekKey, ghost, offsetX, offsetY}

function getSlotFromPoint(x,y){
  // Find which td.slot or td.slot-half is under the point
  var els=document.elementsFromPoint(x,y);
  for(var i=0;i<els.length;i++){
    var el=els[i];
    if(el.tagName==='TD'&&(el.classList.contains('slot')||el.classList.contains('slot-half'))){
      // Extract day and slot from ondrop attribute or data
      var drop=el.getAttribute('data-drop');
      if(drop){
        var p=drop.split(',');
        return {wKey:p[0],day:parseInt(p[1]),slot:parseInt(p[2]),el:el};
      }
    }
  }
  return null;
}

function createGhost(label,bg,tc){
  var g=document.createElement('div');
  g.style.cssText='position:fixed;z-index:9999;pointer-events:none;background:'+bg+';color:'+tc+
    ';border-radius:4px;padding:3px 8px;font-size:10px;font-weight:600;opacity:.85;'+
    'box-shadow:0 4px 12px rgba(0,0,0,.5);white-space:nowrap;transition:none';
  g.textContent=label;
  document.body.appendChild(g);
  return g;
}

function bankMouseDown(e,tid){
  if(e.button!==0)return;
  e.stopPropagation();
  e.preventDefault();
  var biEl=e.target;
  while(biEl&&!biEl.dataset.tid)biEl=biEl.parentElement;
  if(!biEl||!biEl.dataset.tid)return;
  var LOCKED_TID=parseInt(biEl.dataset.tid);
  var t=tasks.find(function(x){return x.id===LOCKED_TID;});
  if(!t)return;
  var LOCKED_LABEL=t.label;
  var LOCKED_BG=t.bg;
  var LOCKED_SLOTS=t.slots;
  var LOCKED_TC=textColor(t.bg,t.textColor);
  var ghost=createGhost(LOCKED_LABEL,LOCKED_BG,LOCKED_TC);
  ghost.style.left=(e.clientX+6)+'px';
  ghost.style.top=(e.clientY-8)+'px';
  var lastHL=null;
  var onMove=function(ev){
    ghost.style.left=(ev.clientX+6)+'px';
    ghost.style.top=(ev.clientY-8)+'px';
    if(lastHL){lastHL.classList.remove('dov');lastHL=null;}
    var under=document.elementsFromPoint(ev.clientX,ev.clientY);
    for(var i=0;i<under.length;i++){
      var u=under[i];
      if(u.tagName==='TD'&&(u.classList.contains('slot')||u.classList.contains('slot-half'))&&u.getAttribute('data-drop')){
        u.classList.add('dov');lastHL=u;break;
      }
    }
  };
  var onUp=function(ev){
    document.removeEventListener('mousemove',onMove);
    document.removeEventListener('mouseup',onUp);
    if(lastHL){lastHL.classList.remove('dov');lastHL=null;}
    ghost.remove();
    var under=document.elementsFromPoint(ev.clientX,ev.clientY);
    for(var i=0;i<under.length;i++){
      var u=under[i];
      if(u.tagName==='TD'&&u.getAttribute('data-drop')){
        var parts=u.getAttribute('data-drop').split(',');
        var wKey=parts[0],day=parseInt(parts[1]),slot=parseInt(parts[2]);
        placed.push({pid:pid++,taskId:LOCKED_TID,day:day,startSlot:slot,
          slots:LOCKED_SLOTS,done:false,notes:'',weekKey:wKey,label:null});
        var sc=document.querySelector('.cal-scroll');
        var st=sc?sc.scrollTop:0;
        renderAll();
        setTimeout(function(){var s2=document.querySelector('.cal-scroll');if(s2)s2.scrollTop=st;},10);
        break;
      }
    }
  };
  document.addEventListener('mousemove',onMove);
  document.addEventListener('mouseup',onUp);
}


// Returns true if 'el' is the topmost block or bl-x at point (x,y)
function isTopmostAt(el, x, y){
  var els = document.elementsFromPoint(x, y);
  for(var i = 0; i < els.length; i++){
    var e = els[i];
    // Skip transparent/non-interactive elements
    if(e === document.documentElement || e === document.body) continue;
    if(window.getComputedStyle(e).pointerEvents === 'none') continue;
    // First real element found - is it our element or a child of it?
    if(e === el || el.contains(e) || e.contains(el)) return true;
    return false;
  }
  return false;
}

      if(els[i].tagName==='TD'&&els[i].getAttribute('data-drop')){
        els[i].classList.add('dov');lastHL=els[i];break;
      }
    }
  };
  var onUp=function(ev){
    document.removeEventListener('mousemove',onMove);
    document.removeEventListener('mouseup',onUp);
    document.body.style.cursor='';
    document.body.style.userSelect='';
    if(lastHL){lastHL.classList.remove('dov');lastHL=null;}

        renderAll();
        setTimeout(function(){var s=document.querySelector('.cal-scroll');if(s)s.scrollTop=st;},10);
        break;
      }
    }
  };
  document.addEventListener('mousemove',onMove);
  document.addEventListener('mouseup',onUp);
}

var _lastHighlight=null;
function highlightDrop(x,y){
  if(_lastHighlight){_lastHighlight.classList.remove('dov');_lastHighlight=null;}
  var s=getSlotFromPoint(x,y);
  if(s){s.el.classList.add('dov');_lastHighlight=s.el;}
}

function _dragMove(e){
  if(!_drag||!_drag.ghost)return;
  _drag.ghost.style.left=e.clientX+4+'px';
  _drag.ghost.style.top=e.clientY-10+'px';
  highlightDrop(e.clientX,e.clientY);
}

function _dragUp(e){
  document.removeEventListener('mousemove',_dragMove);
  document.removeEventListener('mouseup',_dragUp);
  _dropAt(e.clientX,e.clientY);
}

function _dropAt(x,y){
  if(_lastHighlight){_lastHighlight.classList.remove('dov');_lastHighlight=null;}
  if(!_drag)return;
  var s=getSlotFromPoint(x,y);
  if(s){
    if(_drag.type==='bank'){
      placed.push({pid:pid++,taskId:_drag.taskId,day:s.day,startSlot:s.slot,
        slots:_drag.slots,done:false,notes:'',weekKey:s.wKey,label:null});
    } else if(_drag.type==='block'){
      var pl=placed.find(function(x){return x.pid===_drag.pid;});
      if(pl){pl.day=s.day;pl.startSlot=s.slot;pl.weekKey=s.wKey;}
    }
    var sc=document.querySelector('.cal-scroll');
    var st=sc?sc.scrollTop:0;
    renderAll();
    setTimeout(function(){var s2=document.querySelector('.cal-scroll');if(s2)s2.scrollTop=st;},10);
  }
  if(_drag.ghost)_drag.ghost.remove();
  _drag=null;
}

var notifEnabled=false;
function requestNotif(){if(!('Notification'in window)){alert('Navegador n\u00e3o suporta notifica\u00e7\u00f5es.');return;}Notification.requestPermission().then(function(p){notifEnabled=(p==='granted');if(notifEnabled){scheduleNotifCheck();// Hide banner immediately
var bar=document.querySelector('[onclick="requestNotif()"]');if(bar)bar.closest('div[style]').remove();}renderAll();});}
function notify(title,body){if(notifEnabled&&Notification.permission==='granted'){new Notification(title,{body:body,icon:document.getElementById('fav').href});}}
function scheduleNotifCheck(){setInterval(function(){var now=new Date();events.forEach(function(ev){if(!ev.notify||!ev.day)return;var parts=ev.day.split('-');var ed=new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));if(ed.getFullYear()!==now.getFullYear()||ed.getMonth()!==now.getMonth()||ed.getDate()!==now.getDate())return;var evMin=(ev.hour||0)*60+(ev.minute||0);var nowMin=now.getHours()*60+now.getMinutes();if(Math.abs(evMin-nowMin)<=1&&!ev._notified){ev._notified=true;notify('\u23f0 '+ev.label,ev.notes||'Lembrete Empire Builder');}});},30000);}
if(Notification.permission==='granted'){notifEnabled=true;scheduleNotifCheck();}


// Update now-line position every minute without full re-render
function updateNowLine(){
  var now=new Date();
  var nowH=now.getHours()+now.getMinutes()/60;
  var si=Math.floor(nowH*2);
  var topPct=Math.round((nowH*2-si)*100);
  var lines=document.querySelectorAll('.now-ln');
  lines.forEach(function(ln){
    ln.style.top=topPct+'%';
  });
  // If minute changed, might need to move to different slot - do full render
  if(now.getSeconds()<35){
    // Only re-render if we're near a slot boundary (within 30s)
    var secInSlot=(now.getMinutes()%30)*60+now.getSeconds();
    if(secInSlot<35){
      renderAll();
    }
  }
}
setInterval(updateNowLine, 60000);

function textColor(bg,override){
  if(override==='white')return '#ffffff';
  if(override==='black')return '#000000';
  var r=parseInt(bg.slice(1,3),16),g=parseInt(bg.slice(3,5),16),b=parseInt(bg.slice(5,7),16);
  return (0.299*r+0.587*g+0.114*b)/255<0.45?'#ffffff':'#1a1a1a';
}

// WEEK/MONTH helpers
function getMonthWeeks(year,month){
  // returns array of week objects {weekStart, days[0..6]}
  var firstDay=new Date(year,month,1);
  var lastDay=new Date(year,month+1,0);
  var weeks=[];
  var cur=new Date(firstDay);
  cur.setDate(cur.getDate()-cur.getDay()); // back to Sunday
  while(cur<=lastDay){
    weeks.push(new Date(cur));
    cur.setDate(cur.getDate()+7);
  }
  return weeks;
}
function weekKeyFromDate(d){return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
function getMonthYear(){var now=new Date();return {year:now.getFullYear(),month:now.getMonth()+monthOff*1};}
function normalizeMonthYear(y,m){while(m<0){m+=12;y--;}while(m>11){m-=12;y++;}return {year:y,month:m};}

function fmtD(d){return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});}
function taskDoneInWeek(t,wKey){return placed.some(function(p){return p.taskId===t.id&&p.done&&p.weekKey===wKey;});}

function updateSkillsFromDone(){
  skills.forEach(function(sk){
    if(!sk.taskIds||!sk.taskIds.length)return;
    var linked=placed.filter(function(p){return sk.taskIds.includes(p.taskId)&&p.done;});
    var all=placed.filter(function(p){return sk.taskIds.includes(p.taskId);});
    var ratio=all.length?linked.length/all.length:0;
    sk.val=Math.min(100,Math.round(sk.prev+ratio*10));
  });
}

function eventsForSlot(weekStart,day,slot){
  return events.filter(function(ev){if(!ev.day)return false;
  // Parse date without timezone offset to avoid day shift
  var parts=ev.day.split('-');
  var ed=new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));
  var dt=new Date(weekStart);
  dt.setDate(weekStart.getDate()+day);
  return ed.getFullYear()===dt.getFullYear()&&ed.getMonth()===dt.getMonth()&&ed.getDate()===dt.getDate()&&ev.slot===slot;});
}

function shiftWeek(d){

function deleteTask(id){tasks=tasks.filter(function(x){return x.id!==id;});placed=placed.filter(function(x){return x.taskId!==id;});renderAll();}

function rszDown(e,p,wKey){
  e.stopPropagation();
  e.preventDefault();
  var targetPid=parseInt(p);
  var pl=placed.find(function(x){return x.pid===targetPid;});
  if(!pl)return;
  var sY=e.clientY,sS=pl.slots;
  // show cursor globally during resize
  document.body.style.cursor='ns-resize';
  document.body.style.userSelect='none';
  var mm=function(ev){
    var ns=Math.max(1,Math.round((ev.clientY-sY)/28)+sS);
    var tgt=placed.find(function(x){return x.pid===targetPid;});
    if(!tgt||ns===tgt.slots)return;
    tgt.slots=ns;
    // update just the block height directly without full re-render
    var blkEl=document.querySelector('[data-pid="'+targetPid+'"]');
    if(blkEl)blkEl.style.height=(ns*28-2)+'px';
  };
  var mu=function(){
    document.removeEventListener('mousemove',mm);
    document.removeEventListener('mouseup',mu);
    document.body.style.cursor='';
    document.body.style.userSelect='';
    var tgt2=placed.find(function(x){return x.pid===targetPid;});
    if(tgt2){saveState();}
    var sc=document.querySelector('.cal-scroll');
    var st=sc?sc.scrollTop:0;
    renderAll();
    setTimeout(function(){var s2=document.querySelector('.cal-scroll');if(s2)s2.scrollTop=st;},10);
  };
  document.addEventListener('mousemove',mm);
  document.addEventListener('mouseup',mu,{capture:true});
}
function handleBlkX(e){
  e.stopPropagation();
  e.stopImmediatePropagation();
  e.preventDefault();
  // Find the TOPMOST bl-x button under cursor - skip pointer-events:none
  var els=document.elementsFromPoint(e.clientX,e.clientY);
  for(var i=0;i<els.length;i++){
    var el=els[i];
    if(window.getComputedStyle(el).pointerEvents==='none')continue;
    if(el.classList&&el.classList.contains('bl-x')&&el.dataset.pid){
      removePlaced(parseInt(el.dataset.pid));
      return;
    }
    // If first interactive element is NOT a bl-x, stop - wrong target
    break;
  }
}

  p=parseInt(p);

function renderEmpire(){

  var monthTotals=[];

    var ck=currentYear+'-'+m;
    var ce=lifeCost.entries[ck]||{};
    monthTotals.push(cats.reduce(function(s,c){return s+(parseFloat(ce[c.id])||0);},0));
  }
  var yearTotal=monthTotals.reduce(function(s,v){return s+v;},0);
  var avgMonthly=yearTotal/12;

  // chart
  var chartColors=monthTotals.map(function(_,i){return (i===now.getMonth()&&currentYear===now.getFullYear())?'#4caf50':'#1a3a5c';});

  // build header row: empty cell + 12 months
  var theadCells='<th style="padding:7px 10px;font-size:10px;font-weight:600;color:#444;text-align:left;background:#161616;position:sticky;left:0;z-index:3;border-bottom:1px solid #2a2a2a;border-right:1px solid #2a2a2a;min-width:110px">Categoria</th>';
  for(var m=0;m<12;m++){
    var isNow=(m===now.getMonth()&&currentYear===now.getFullYear());
    theadCells+='<th style="padding:7px 6px;font-size:10px;font-weight:600;color:'+(isNow?'#4caf50':'#555')+';text-align:center;background:#161616;border-bottom:1px solid #2a2a2a;border-right:1px solid #1e1e1e;white-space:nowrap;min-width:72px">'+MNAMES[m]+'</th>';
  }
  theadCells+='<th style="padding:7px 8px;font-size:10px;font-weight:600;color:#444;text-align:right;background:#161616;border-bottom:1px solid #2a2a2a;white-space:nowrap;min-width:80px">Total</th>';

  // build data rows
  var tbodyRows='';
  cats.forEach(function(c){
    var rowTotal=0;
    var cells='<td style="padding:5px 10px;font-size:11px;color:#ccc;background:#161616;position:sticky;left:0;z-index:2;border-bottom:1px solid #1a1a1a;border-right:1px solid #2a2a2a;white-space:nowrap">'+
      '<div style="display:flex;align-items:center;gap:6px">'+
      '<span style="width:7px;height:7px;border-radius:50%;background:'+c.color+';flex-shrink:0"></span>'+
      c.name+
      '<button onclick="deleteLcCat('+c.id+')" style="font-size:11px;opacity:.2;background:none;border:none;color:#888;cursor:pointer;margin-left:2px">\u00d7</button>'+
      '</div></td>';
    for(var m=0;m<12;m++){
      var mKey=currentYear+'-'+m;
      var val=parseFloat((lifeCost.entries[mKey]||{})[c.id])||0;
      rowTotal+=val;
      var isNow2=(m===now.getMonth()&&currentYear===now.getFullYear());
      cells+='<td style="padding:3px 4px;border-bottom:1px solid #1a1a1a;border-right:1px solid #1a1a1a;background:'+(isNow2?'#0d1a0d':'#0e0e0e')+'">'+
        '<input type="number" value="'+(val||'')+'" min="0" step="0.01" placeholder="" '+
          'onchange="setLcEntry2('+c.id+','+m+','+currentYear+',this.value)" '+
          'style="width:100%;background:transparent;border:none;color:#e0e0e0;font-size:11px;padding:2px 4px;font-family:inherit;text-align:right;outline:none">'+
        '</td>';
    }
    cells+='<td style="padding:5px 8px;font-size:11px;font-weight:600;color:#888;text-align:right;border-bottom:1px solid #1a1a1a;white-space:nowrap" id="lc-rowt-'+c.id+'">'+
      (rowTotal>0?'R$'+rowTotal.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}):'—')+
    '</td>';
    tbodyRows+='<tr>'+cells+'</tr>';
  });

  // totals row
  var totalCells='<td style="padding:6px 10px;font-size:11px;font-weight:700;color:#e0e0e0;background:#161616;position:sticky;left:0;z-index:2;border-top:1px solid #333;border-right:1px solid #2a2a2a">TOTAL</td>';
  for(var m=0;m<12;m++){
    var isNow3=(m===now.getMonth()&&currentYear===now.getFullYear());
    totalCells+='<td style="padding:6px 4px;font-size:11px;font-weight:600;color:'+(monthTotals[m]>0?'#4caf50':'#333')+';text-align:right;border-top:1px solid #333;border-right:1px solid #1a1a1a;background:'+(isNow3?'#0d1a0d':'#0e0e0e')+';white-space:nowrap" id="lc-m-'+m+'">'+
      (monthTotals[m]>0?'R$'+monthTotals[m].toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}):'—')+
    '</td>';
  }
  totalCells+='<td style="padding:6px 8px;font-size:12px;font-weight:700;color:#4caf50;text-align:right;border-top:1px solid #333;white-space:nowrap">R$'+yearTotal.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})+'</td>';

  document.getElementById('view-empire').innerHTML=
    '<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">'+
    '<span style="font-size:16px;font-weight:600;flex:1">'+currentYear+'</span>'+
    '<button class="sbtn" onclick="shiftLcYear(-1)">\u2190</button>'+
    '<button class="sbtn" onclick="shiftLcYear(0)">Este ano</button>'+
    '<button class="sbtn" onclick="shiftLcYear(1)">\u2192</button>'+
    '</div>'+

    // TABLE
    '<div style="background:#161616;border:1px solid #2a2a2a;border-radius:10px;overflow:auto;margin-bottom:12px;max-height:calc(100vh - 280px)">'+
    '<table style="width:100%;border-collapse:collapse;table-layout:auto">'+
    '<thead><tr>'+theadCells+'</tr></thead>'+
    '<tbody>'+tbodyRows+'</tbody>'+
    '<tfoot><tr>'+totalCells+'</tr></tfoot>'+
    '</table></div>'+

    // ADD ROW
    '<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:12px">'+
    '<input id="lc-new-name" placeholder="Nova categoria" style="flex:1;min-width:100px;font-size:11px;padding:5px 8px;border:1px solid #2a2a2a;border-radius:6px;background:#0e0e0e;color:#e0e0e0;font-family:inherit">'+
    '<input type="color" id="lc-new-color" value="#AFA9EC" style="width:28px;height:28px;border:none;border-radius:5px;cursor:pointer;padding:0">'+
    '<button class="sbtn ok" style="font-size:10px;padding:4px 9px" onclick="addLcCat()">+ Categoria</button>'+
    '</div>'+

    // METRICS + CHART
    '<div style="display:grid;grid-template-columns:1fr 1fr 2fr;gap:10px;align-items:start">'+
    '<div class="metric"><div class="metric-lbl">Total do ano</div><div class="metric-val" style="font-size:18px">R$'+yearTotal.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})+'</div></div>'+
    '<div class="metric"><div class="metric-lbl">M\u00e9dia mensal</div><div class="metric-val" style="font-size:18px">R$'+avgMonthly.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})+'</div></div>'+
    '<div style="background:#161616;border:1px solid #2a2a2a;border-radius:10px;padding:10px">'+
    '<div style="font-size:9px;font-weight:600;color:#444;letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px">Gastos mensais</div>'+
    '<div style="position:relative;height:80px"><canvas id="lc-chart" role="img" aria-label="Gastos">Gastos.</canvas></div>'+

    '<div style="background:#161616;border:1px solid #2a2a2a;border-radius:10px;padding:12px;margin-top:14px">'+
    '<div style="font-size:10px;font-weight:600;color:#444;letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px">Lista de compras</div>'+
    (lifeCost.shoppingList&&lifeCost.shoppingList.length?
      lifeCost.shoppingList.map(function(item,i){
        return '<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #1a1a1a">'+
          '<input type="checkbox" '+(item.done?'checked':'')+' onchange="toggleShopItem('+i+')" style="width:14px;height:14px;accent-color:#4caf50;cursor:pointer;flex-shrink:0">'+
          '<span style="flex:1;font-size:12px;color:'+(item.done?'#444':'#ccc')+';text-decoration:'+(item.done?'line-through':'none')+'">'+item.name+'</span>'+
          (item.price?'<span style="font-size:11px;color:#555">R$'+parseFloat(item.price).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})+'</span>':'')+
          '<button onclick="deleteShopItem('+i+')" style="font-size:12px;opacity:.25;background:none;border:none;color:#888;cursor:pointer">×</button>'+
          '</div>';
      }).join('')
    :'<div style="font-size:11px;color:#333;padding:6px 0">Nenhum item ainda</div>')+
    '<div style="display:flex;gap:6px;margin-top:10px">'+
    '<input id="shop-name" placeholder="Item..." style="flex:2;font-size:12px;padding:5px 8px;border:1px solid #2a2a2a;border-radius:6px;background:#0e0e0e;color:#e0e0e0;font-family:inherit">'+
    '<input id="shop-price" type="number" placeholder="R$" min="0" step="0.01" style="flex:1;font-size:12px;padding:5px 8px;border:1px solid #2a2a2a;border-radius:6px;background:#0e0e0e;color:#e0e0e0;font-family:inherit">'+
    '<button class="sbtn ok" style="font-size:10px;padding:4px 9px" onclick="addShopItem()">+ Add</button>'+
    '</div>'+
    '</div>'+    '</div></div>';

  if(revChart){revChart.destroy();revChart=null;}
  revChart=new Chart(document.getElementById('lc-chart'),{
    type:'bar',
    data:{labels:MNAMES,datasets:[{label:'R$',data:monthTotals,backgroundColor:chartColors,borderRadius:3}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(ctx){return'R$'+ctx.parsed.y.toLocaleString('pt-BR',{minimumFractionDigits:2});}}}},
      scales:{x:{ticks:{font:{size:8},color:'#444'},grid:{display:false}},
              y:{ticks:{font:{size:8},color:'#444',callback:function(v){return'R$'+v.toLocaleString('pt-BR');}},grid:{color:'rgba(255,255,255,.03)'}}}}
  });
  saveLc();
}

var MONTHS_LC=['\u004aaaneiro','\u0046evereiro','\u004dar\u00e7o','\u0041bril','\u004daio','\u004aunho','\u004aulho','\u0041gosto','\u0053etembro','\u004futubro','\u004eovembro','\u0044ezembro'];
var lifeCost=(function(){try{var s=localStorage.getItem('empire-lifecost');if(s)return JSON.parse(s);}catch(e){}return {shoppingList:[],categories:[{id:1,name:'Mercado',color:'#C0DD97'},{id:2,name:'\u00c1gua',color:'#B5D4F4'},{id:3,name:'Internet',color:'#AFA9EC'},{id:4,name:'VIVO',color:'#F4C0D1'},{id:5,name:'iCloud',color:'#9FE1CB'},{id:6,name:'Claude',color:'#FAC775'},{id:7,name:'Corte de cabelo',color:'#F0997B'},{id:8,name:'Academia',color:'#85B7EB'},{id:9,name:'Boxe',color:'#ED93B1'}],entries:{},lcMonthOff:0};})();
var lcCatId=20;
function saveLc(){try{localStorage.setItem('empire-lifecost',JSON.stringify(lifeCost));}catch(e){}}
function shiftLcYear(d){if(d===0)lifeCost.lcYearOff=0;else lifeCost.lcYearOff=(lifeCost.lcYearOff||0)+d;renderEmpire();}
function shiftLcMonth(d){shiftLcYear(d);}
function setLcEntry2(catId,month,year,val){
  var mKey=year+'-'+month;
  if(!lifeCost.entries[mKey])lifeCost.entries[mKey]={};
  var v=parseFloat(val)||0;
  if(v===0)delete lifeCost.entries[mKey][catId];else lifeCost.entries[mKey][catId]=v;
  var cats=lifeCost.categories;
  var entries=lifeCost.entries[mKey]||{};
  var mTotal=cats.reduce(function(sum,c){return sum+(parseFloat(entries[c.id])||0);},0);
  var el=document.getElementById('lc-m-'+month);
  if(el)el.textContent=mTotal>0?'R$'+mTotal.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}):'\u2014';
  var rowTotal=0;
  for(var m2=0;m2<12;m2++){var mk=year+'-'+m2;rowTotal+=parseFloat(((lifeCost.entries[mk]||{})[catId])||0);}
  var rel=document.getElementById('lc-rowt-'+catId);
  if(rel)rel.textContent=rowTotal>0?'R$'+rowTotal.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}):'\u2014';
  saveLc();
}
function setLcEntry(catId,val){setLcEntry2(catId,new Date().getMonth(),new Date().getFullYear(),val);}
function addLcCat(){var name=document.getElementById('lc-new-name').value.trim();if(!name)return;var color=document.getElementById('lc-new-color').value;lifeCost.categories.push({id:lcCatId++,name:name,color:color});saveLc();renderEmpire();}
function deleteLcCat(id){lifeCost.categories=lifeCost.categories.filter(function(c){return c.id!==id;});saveLc();renderEmpire();}

function showModal(html){var _old=document.getElementById('modal-root-inner');if(_old)_old.remove();var bg=document.createElement('div');bg.className='modal-bg';bg.id='modal-root-inner';bg.innerHTML='<div class="modal">'+html+'</div>';bg.addEventListener('click',function(e){if(e.target===bg)closeModal();});bg.addEventListener('keydown',function(e){  if(e.key!=='Enter')return;  if(e.target.tagName==='TEXTAREA')return;  e.preventDefault();  var okBtn=bg.querySelector('.mb.ok,.sbtn.ok');  if(okBtn)okBtn.click();});document.getElementById('modal-root').appendChild(bg);}
function closeModal(){var el=document.getElementById('modal-root-inner');if(el)el.remove();if(activeTab==='cal')renderAll();if(activeTab==='empire')renderEmpire();}
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});
try{renderAll();}catch(e){
  console.error(e);
  var msg=document.createElement('div');
  msg.style.cssText='color:#e74c3c;padding:20px;font-size:13px';
  msg.innerHTML='Erro: '+e.message;
  var btn=document.createElement('button');
  btn.textContent='Limpar cache e recarregar';
  btn.style.cssText='margin-top:10px;padding:8px 16px;background:#e74c3c;color:#fff;border:none;border-radius:6px;cursor:pointer;display:block';
  btn.onclick=function(){localStorage.clear();location.reload();};
  msg.appendChild(btn);
  document.getElementById('view-cal').appendChild(msg);
}
